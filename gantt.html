<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gantt Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#f6f7fb;
}

/* HEADER */
.header{
    padding:18px 24px;
    font-size:18px;
    font-weight:600;
    background:white;
    border-bottom:1px solid #e5e7eb;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* LEFT PANEL (FIXED) */
.left{
    width:420px;
    background:white;
    border-right:1px solid #e5e7eb;
    overflow:auto;
}

.task-row{
    display:grid;
    grid-template-columns: 1fr 110px 110px 110px;
    gap:6px;
    padding:10px;
    border-bottom:1px solid #f1f1f1;
    font-size:12px;
}

.task-row input, .task-row select{
    font-size:12px;
    padding:4px;
}

/* RIGHT PANEL (SCROLLABLE TIMELINE) */
.right{
    flex:1;
    overflow:auto;
    padding:20px;
}

/* THIS IS THE KEY FIX */
.timeline-scroll{
    min-width:1200px; /* forces horizontal scroll */
}

/* HEADER */
.timeline-header{
    display:flex;
    font-size:11px;
    color:#666;
    margin-bottom:10px;
}

.timeline-header div{
    width:120px; /* FIX: fixed width prevents overlap */
    text-align:center;
    flex-shrink:0;
}

/* GANTT ROW */
.gantt-row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.label{
    width:200px;
    font-size:13px;
    padding-right:10px;
    flex-shrink:0;
}

/* BAR AREA */
.bar-area{
    position:relative;
    height:26px;
    background:#f1f5f9;
    border-radius:8px;
    width:100%;
    min-width:1000px; /* enables scroll */
}

.bar{
    position:absolute;
    height:100%;
    border-radius:8px;
}

.notstarted{ background:#94a3b8; }
.progress{ background:#2563eb; }
.complete{ background:#16a34a; }

button{
    margin:10px;
    padding:8px 12px;
    border:none;
    background:#111;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Freeze–Thaw Experiment Gantt Chart</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<button onclick="addTask()">+ Add Task</button>
<div id="taskList"></div>
</div>

<!-- RIGHT -->
<div class="right">
<div class="timeline-scroll">
<div id="timelineHeader" class="timeline-header"></div>
<div id="gantt"></div>
</div>
</div>

</div>

<script>

let tasks = [
{name:"Obtain Pipe Cap", start:"2026-06-22", end:"2026-06-26", status:"In Progress"},
{name:"Assemble Apparatus", start:"2026-06-27", end:"2026-07-05", status:"Not Started"},
{name:"Install Bender Elements", start:"2026-07-06", end:"2026-07-12", status:"Not Started"},
{name:"System Testing", start:"2026-07-13", end:"2026-07-20", status:"Not Started"}
];

function addTask(){
    tasks.push({
        name:"New Task",
        start:"2026-07-01",
        end:"2026-07-05",
        status:"Not Started"
    });
    render();
}

/* LEFT */
function renderLeft(){
    const el = document.getElementById("taskList");
    el.innerHTML="";

    tasks.forEach((t,i)=>{
        const row = document.createElement("div");
        row.className="task-row";

        row.innerHTML=`
        <input value="${t.name}"
        onchange="tasks[${i}].name=this.value;render()">

        <input type="date" value="${t.start}"
        onchange="tasks[${i}].start=this.value;render()">

        <input type="date" value="${t.end}"
        onchange="tasks[${i}].end=this.value;render()">

        <select onchange="tasks[${i}].status=this.value;render()">
            <option ${t.status==="Not Started"?"selected":""}>Not Started</option>
            <option ${t.status==="In Progress"?"selected":""}>In Progress</option>
            <option ${t.status==="Complete"?"selected":""}>Complete</option>
        </select>
        `;

        el.appendChild(row);
    });
}

/* RIGHT */
function renderGantt(){

    const gantt = document.getElementById("gantt");
    const header = document.getElementById("timelineHeader");

    gantt.innerHTML="";
    header.innerHTML="";

    let dates=[];

    tasks.forEach(t=>{
        dates.push(new Date(t.start));
        dates.push(new Date(t.end));
    });

    const min = new Date(Math.min(...dates));
    const max = new Date(Math.max(...dates));

    const totalDays = (max-min)/(1000*60*60*24)+1;

    const step = Math.ceil(totalDays/10); // nice spacing

    for(let i=0;i<totalDays;i+=step){
        let d = new Date(min);
        d.setDate(d.getDate()+i);

        let div = document.createElement("div");
        div.innerText = d.toLocaleDateString("en-CA",{month:"short",day:"numeric"});
        header.appendChild(div);
    }

    tasks.forEach(t=>{

        const row = document.createElement("div");
        row.className="gantt-row";

        const label = document.createElement("div");
        label.className="label";
        label.innerText=t.name;

        const area = document.createElement("div");
        area.className="bar-area";

        const startOffset = (new Date(t.start)-min)/(1000*60*60*24);
        const duration = (new Date(t.end)-new Date(t.start))/(1000*60*60*24)+1;

        const bar = document.createElement("div");
        bar.className="bar "+t.status.toLowerCase().replace(" ","");

        bar.style.left = (startOffset/totalDays*100)+"%";
        bar.style.width = (duration/totalDays*100)+"%";

        area.appendChild(bar);

        row.appendChild(label);
        row.appendChild(area);

        gantt.appendChild(row);
    });
}

function render(){
    renderLeft();
    renderGantt();
}

render();

</script>

</body>
</html>
