<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Gantt Chart</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    font-family:Inter, sans-serif;
    margin:0;
    background:#f6f7fb;
    color:#111;
}

.header{
    padding:20px 30px;
    font-size:20px;
    font-weight:600;
    background:white;
    border-bottom:1px solid #e5e7eb;
}

.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* LEFT PANEL */
.left{
    width:420px;
    background:white;
    border-right:1px solid #e5e7eb;
    overflow:auto;
}

.task-row{
    display:grid;
    grid-template-columns: 1fr 120px 120px 100px;
    padding:10px;
    border-bottom:1px solid #f0f0f0;
    align-items:center;
    font-size:13px;
}

.task-row input, .task-row select{
    width:95%;
    padding:5px;
    font-size:12px;
}

/* RIGHT PANEL */
.right{
    flex:1;
    overflow:auto;
    padding:20px;
}

/* TIMELINE */
.timeline-header{
    display:flex;
    margin-left:200px;
    font-size:12px;
    color:#666;
    margin-bottom:10px;
}

.timeline-header div{
    flex:1;
    text-align:center;
}

.gantt-row{
    display:flex;
    align-items:center;
    margin-bottom:10px;
    position:relative;
}

.label{
    width:200px;
    font-size:13px;
    padding-right:10px;
}

.bar-area{
    position:relative;
    flex:1;
    height:28px;
    background:#f1f5f9;
    border-radius:8px;
}

.bar{
    position:absolute;
    height:100%;
    border-radius:8px;
}

.notstarted{ background:#94a3b8; }
.progress{ background:#2563eb; }
.complete{ background:#16a34a; }

.today-line{
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    background:#ef4444;
}

button{
    margin:10px;
    padding:8px 12px;
    border:none;
    background:#111;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Freeze–Thaw Experiment Gantt Chart</div>

<div class="container">

<!-- LEFT -->
<div class="left">
<button onclick="addTask()">+ Add Task</button>
<div id="taskList"></div>
</div>

<!-- RIGHT -->
<div class="right">
<div id="timelineHeader" class="timeline-header"></div>
<div id="gantt"></div>
</div>

</div>

<script>

let tasks = [
{
name:"Obtain Pipe Cap",
start:"2026-06-22",
end:"2026-06-26",
status:"In Progress",
progress:30
},
{
name:"Assemble Apparatus",
start:"2026-06-27",
end:"2026-07-05",
status:"Not Started",
progress:0
},
{
name:"Install Bender Elements",
start:"2026-07-06",
end:"2026-07-12",
status:"Not Started",
progress:0
},
{
name:"System Testing",
start:"2026-07-13",
end:"2026-07-20",
status:"Not Started",
progress:0
}
];

function addTask(){
    tasks.push({
        name:"New Task",
        start:"2026-07-01",
        end:"2026-07-05",
        status:"Not Started",
        progress:0
    });
    render();
}

function renderLeft(){

    const container = document.getElementById("taskList");
    container.innerHTML = "";

    tasks.forEach((t,i)=>{

        const div = document.createElement("div");
        div.className="task-row";

        div.innerHTML = `
        <input value="${t.name}"
        onchange="tasks[${i}].name=this.value;render()">

        <input type="date" value="${t.start}"
        onchange="tasks[${i}].start=this.value;render()">

        <input type="date" value="${t.end}"
        onchange="tasks[${i}].end=this.value;render()">

        <select onchange="tasks[${i}].status=this.value;render()">
            <option ${t.status==="Not Started"?"selected":""}>Not Started</option>
            <option ${t.status==="In Progress"?"selected":""}>In Progress</option>
            <option ${t.status==="Complete"?"selected":""}>Complete</option>
        </select>
        `;

        container.appendChild(div);
    });
}

function renderGantt(){

    const gantt = document.getElementById("gantt");
    const header = document.getElementById("timelineHeader");

    gantt.innerHTML="";
    header.innerHTML="";

    let dates = [];

    tasks.forEach(t=>{
        dates.push(new Date(t.start));
        dates.push(new Date(t.end));
    });

    const min = new Date(Math.min(...dates));
    const max = new Date(Math.max(...dates));

    const days = (max-min)/(1000*60*60*24)+1;

    // header (monthly labels every ~7 days)
    for(let i=0;i<days;i+=7){
        let d = new Date(min);
        d.setDate(d.getDate()+i);

        let div = document.createElement("div");
        div.innerText = d.toLocaleDateString("en-CA",{month:"short",day:"numeric"});
        header.appendChild(div);
    }

    const today = new Date();

    tasks.forEach(t=>{

        const row = document.createElement("div");
        row.className="gantt-row";

        const label = document.createElement("div");
        label.className="label";
        label.innerText=t.name;

        const area = document.createElement("div");
        area.className="bar-area";

        const startOffset = (new Date(t.start)-min)/(1000*60*60*24);
        const duration = (new Date(t.end)-new Date(t.start))/(1000*60*60*24)+1;

        const bar = document.createElement("div");
        bar.className="bar "+t.status.toLowerCase().replace(" ","");

        bar.style.left = (startOffset/days*100)+"%";
        bar.style.width = (duration/days*100)+"%";

        area.appendChild(bar);

        row.appendChild(label);
        row.appendChild(area);

        gantt.appendChild(row);
    });

    // TODAY LINE
    const todayOffset = (today-min)/(1000*60*60*24);
    const line = document.createElement("div");
    line.className="today-line";
    line.style.left = (todayOffset/days*100)+"%";

    gantt.appendChild(line);
}

function render(){
    renderLeft();
    renderGantt();
}

render();

</script>

</body>
</html>
